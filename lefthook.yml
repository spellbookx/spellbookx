# lefthook.yml
pre-commit:
  commands:
    prettier:
      run: pnpm prettier --ignore-unknown --write {staged_files}
      stage_fixed: true
      exclude:
        - '*.md'

commit-msg:
  commands:
    lint-commit-msg:
      run: pnpm exec commitlint --edit {1}

pre-push:
  files: pnpm prettier --check . --ignore-path .prettierignore
  commands:
    check-write-format:
      run: pnpm prettier --write . --ignore-path .prettierignore
