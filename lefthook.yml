pre-commit:
  commands:
    prettier:
      run: pnpm prettier --ignore-unknown --write {staged_files}
      stage_fixed: true
      exclude:
        - '*.md'

commit-msg:
  commands:
    lint-commit-msg:
      run: pnpm exec commitlint --edit {1}

pre-push:
  commands:
    # test:
    # run: pnpm test
    lint:
      run: pnpm prettier --check .
      exclude:
        - '*.md'
